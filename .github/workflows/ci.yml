name: CI Build and Test

on:
  push:
    branches: [ main, "dev-*" ]
  pull_request:
    branches: [ main, "dev-*" ]

jobs:
  build_and_test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Cache Nitpick Compiler & LLVM
        id: cache-nitpick
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/bin/npkc
            /usr/local/bin/npkbld
            /usr/lib/llvm-20
          key: ${{ runner.os }}-npk-llvm20

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libssh2-1-dev libssl-dev build-essential llvm-20-dev clang-20 dpkg-dev rpm flatpak-builder cmake ninja-build

      - name: Build Nitpick Compiler
        if: steps.cache-nitpick.outputs.cache-hit != 'true'
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git clone --recursive https://github.com/alternative-intelligence-cp/nitpick.git /tmp/nitpick
          cd /tmp/nitpick
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER=clang-20 -DCMAKE_CXX_COMPILER=clang++-20 -DLLVM_DIR=/usr/lib/llvm-20/lib/cmake/llvm
          cmake --build build -j$(nproc)
          sudo cp build/npkc /usr/local/bin/

          git clone https://github.com/alternative-intelligence-cp/nitpick-build.git /tmp/nitpick-build
          cd /tmp/nitpick-build
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j$(nproc)
          sudo cp build/npkbld /usr/local/bin/

      - name: Code Quality Checks
        run: |
          # Lint and Safety
          if command -v npkc &> /dev/null; then
            npkc lint src/
            npkc analyze --safety-level=high src/
          fi
          
          # Check for missing license headers
          if grep -r -L "AGPL-3.0-only" src/ | grep -q "\.npk$"; then
            echo "Error: Missing license headers."
            exit 1
          fi

      - name: Build Nitty
        run: npkbld build --release

      - name: Run Unit Tests
        run: npkbld test tests/

      - name: Run E2E Tests
        run: bash tests/e2e/run_e2e.sh || true

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.os }}
          path: .nitpick_make/test_results.xml
