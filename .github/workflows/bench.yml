name: Performance Benchmarks

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Need history to compare against baseline

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libssh2-1-dev libssl-dev python3 python3-pip

      - name: Build Project
        run: npkbld build --release

      - name: Run Benchmarks
        run: npkbld test tests/bench/ > benchmark_results.txt

      - name: Compare with Baseline
        id: compare
        run: |
          # Fetch the latest baseline if it exists
          if [ -f "baseline_results.txt" ]; then
            python3 scripts/compare_bench.py baseline_results.txt benchmark_results.txt > diff.txt
            if grep -q "REGRESSION DETECTED" diff.txt; then
              echo "regression=true" >> $GITHUB_OUTPUT
              cat diff.txt
              exit 1
            fi
          fi

      - name: Store New Baseline
        if: success() && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-baseline
          path: benchmark_results.txt

      - name: Comment PR with Results
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🚨 **Performance Regression Detected** (>10% degradation). Please check the benchmark workflow logs.'
            })
