name: Automated Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache Nitpick Compiler & LLVM
        id: cache-nitpick
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/bin/npkc
            /usr/local/bin/npkbld
            /usr/lib/llvm-20
          key: ${{ runner.os }}-npk-llvm20

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libssh2-1-dev libssl-dev build-essential llvm-20-dev clang-20 dpkg-dev rpm flatpak-builder cmake ninja-build liburing-dev libclang-20-dev lld-20

      - name: Build Nitpick Compiler
        if: steps.cache-nitpick.outputs.cache-hit != 'true'
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git clone --recursive https://github.com/alternative-intelligence-cp/nitpick.git /tmp/nitpick
          cd /tmp/nitpick
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER=clang-20 -DCMAKE_CXX_COMPILER=clang++-20 -DLLVM_DIR=/usr/lib/llvm-20/lib/cmake/llvm
          cmake --build build -j$(nproc)
          sudo cp build/npkc /usr/local/bin/

          git clone https://github.com/alternative-intelligence-cp/nitpick-build.git /tmp/nitpick-build
          cd /tmp/nitpick-build
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j$(nproc)
          sudo cp build/npkbld /usr/local/bin/

      - name: Run Full Test Suite
        run: |
          npkbld test tests/
          bash tests/e2e/run_e2e.sh || true
          npkbld test tests/compat/

      - name: Fetch Dependencies and Build Shims
        run: |
          mkdir -p REPOS
          cd REPOS
          git clone https://github.com/alternative-intelligence-cp/nitpick-packages.git
          git clone https://github.com/alternative-intelligence-cp/nitpick-libc.git
          
          # Build shims for packages
          for pkg in nitpick-packages/packages/*; do
            if [ -d "$pkg/shim" ]; then
              echo "Building shim in $pkg/shim"
              if [ -f "$pkg/shim/Makefile" ]; then
                make -C "$pkg/shim" || true
              fi
            fi
          done
          
          # Build shim for nitpick-libc
          if [ -d "nitpick-libc/shim" ] && [ -f "nitpick-libc/shim/Makefile" ]; then
             make -C "nitpick-libc/shim" || true
          fi
          
          cd ..
          # Substitute the hardcoded path
          sed -i "s|/home/randy/Workspace/REPOS|$PWD/REPOS|g" build.abc
          find src tests plugins -name "*.npk" -type f -exec sed -i "s|/home/randy/Workspace/REPOS/nitty|$PWD|g" {} +
          find src tests plugins -name "*.npk" -type f -exec sed -i "s|/home/randy/Workspace/REPOS|$PWD/REPOS|g" {} +
          sed -i 's|compiler = "npkc"|compiler = "/usr/local/bin/npkc"|g' build.abc
          awk '/^\[target\.test_/ { skip=1; next } /^\[/ { skip=0 } !skip { print }' build.abc > build.abc.tmp && mv build.abc.tmp build.abc
          sudo chmod +x /usr/local/bin/npkc /usr/local/bin/npkbld || true

      - name: Build Release Binary
        run: npkbld build nitty

      - name: Create Tarball
        run: tar -czf nitty-linux-x86_64.tar.gz -C .nitpick_make/build nitty

      - name: Build Debian Package
        run: bash scripts/build-deb.sh

      - name: Build RPM Package
        run: bash scripts/build-rpm.sh

      - name: Build AppImage
        run: bash scripts/build-appimage.sh

      - name: Build Flatpak
        run: bash scripts/build-flatpak.sh

      - name: Generate Release Notes
        id: release_notes
        run: |
          bash scripts/generate-release-notes.sh "${{ github.ref_name }}" > release_notes.md

      - name: Generate Checksums
        run: |
          sha256sum build-deb/*.deb build-rpm/RPMS/x86_64/*.rpm build-appimage/*.AppImage build-flatpak/*.flatpak nitty-linux-x86_64.tar.gz > SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: |
            build-deb/*.deb
            build-rpm/RPMS/x86_64/*.rpm
            build-appimage/*.AppImage
            build-flatpak/*.flatpak
            nitty-linux-x86_64.tar.gz
            SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
