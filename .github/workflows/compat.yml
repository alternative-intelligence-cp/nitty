name: Weekly Compatibility Test

on:
  schedule:
    - cron: '0 2 * * 0' # Every Sunday at 02:00 UTC
  workflow_dispatch:

jobs:
  compat_test:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libssh2-1-dev libssl-dev build-essential llvm-20-dev clang-20

      - name: Build Project
        run: npkbld build --release

      - name: Run Compatibility Suite
        run: npkbld test tests/compat/

      - name: Run Reduced Stress Tests
        # Run stress tests for 5 minutes instead of 1 hour
        run: NITTY_STRESS_DURATION=300 npkbld test tests/stress/

      - name: Run Security Tests
        run: npkbld test tests/security/

      - name: Generate Compatibility Matrix
        run: echo "Compat tests passed successfully" > compat_report.txt

      - name: Create Issue on Failure
        uses: actions/github-script@v7
        if: failure()
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Automated Compatibility Test Failure',
              body: 'The weekly compatibility, stress, or security tests failed. Please check the action logs: ' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId
            })
