app-id: com.nitty.Terminal
runtime: org.gnome.Platform
runtime-version: '46'
sdk: org.gnome.Sdk
command: nitty
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=x11
  - --device=dri
  - --share=network
  - --share=ipc
  - --talk-name=org.freedesktop.Flatpak
  - --filesystem=home
  - --device=all

modules:
  - name: libssh2
    buildsystem: cmake-ninja
    config-opts:
      - -DBUILD_SHARED_LIBS=ON
    sources:
      - type: archive
        url: https://libssh2.org/download/libssh2-1.11.0.tar.gz
        sha256: 3736161e41e2693324deb38c26cfdc3efe6209d634ba4258db1cecff6a5ad461

  - name: nitty
    buildsystem: simple
    build-commands:
      - npkbld build --release
      - install -D -m 0755 .nitpick_make/build/nitty /app/bin/nitty
      - install -D -m 0644 packaging/nitty.desktop /app/share/applications/nitty.desktop
      - install -D -m 0644 packaging/nitty.metainfo.xml /app/share/metainfo/com.nitty.Terminal.metainfo.xml
      - install -D -m 0644 docs/nitty.1 /app/share/man/man1/nitty.1
      - install -D -m 0644 packaging/icons/nitty-128x128.png /app/share/icons/hicolor/128x128/apps/com.nitty.Terminal.png
      - install -D -m 0644 packaging/icons/nitty-256x256.png /app/share/icons/hicolor/256x256/apps/com.nitty.Terminal.png
      - install -D -m 0644 packaging/icons/nitty-512x512.png /app/share/icons/hicolor/512x512/apps/com.nitty.Terminal.png
    sources:
      - type: dir
        path: ../../
